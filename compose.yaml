services:
  mysql:
    image: mysql:8
    container_name: northwind-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: northwind
      MYSQL_USER: northwind_user
      MYSQL_PASSWORD: northwind_password
      MYSQL_ROOT_PASSWORD: northwind_root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql-volume:/var/lib/mysql
      - ./Database/MySQL:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pnorthwind_root_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Backend
    container_name: northwind-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: "4000"
      MYSQL_HOST: mysql
      MYSQL_USER: northwind_user
      MYSQL_PASSWORD: northwind_password
      MYSQL_DATABASE: northwind
      MYSQL_PORT: "3306"
      IMAGES_LOCATION: http://localhost:4000/api/products/images/
      EMPLOYEE_IMAGES_LOCATION: http://localhost:4000/api/employees/images/
      JWT_SECRET: local_dev_jwt_secret_123
      HASH_SALT: "10"
      RECAPTCHA_SECRET_KEY: ""
      OPENAI_API_KEY: ""
    ports:
      - "4000:4000"

volumes:
  mysql-volume:
